version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: watchtower_postgres
    restart: always
    environment:
      POSTGRES_USER: watchtower
      POSTGRES_PASSWORD: watchtower_secret
      POSTGRES_DB: watchtower
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: watchtower_redis
    restart: always
    ports:
      - "6379:6379"

  api:
    build: ./apps/api
    container_name: watchtower_api
    restart: always
    depends_on:
      - postgres
      - redis
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://watchtower:watchtower_secret@postgres:5432/watchtower
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: your_jwt_secret
      JWT_REFRESH_SECRET: your_refresh_secret

  dashboard:
    build: ./apps/dashboard
    container_name: watchtower_dashboard
    restart: always
    depends_on:
      - api
    ports:
      - "3001:3001"
    environment:
      NEXT_PUBLIC_API_URL: http://api:3000
      NEXT_PUBLIC_WS_URL: http://api:3000

volumes:
  postgres_data: