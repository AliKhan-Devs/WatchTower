version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: watchtower_postgres
    restart: always
    environment:
      POSTGRES_USER: watchtower
      POSTGRES_PASSWORD: watchtower_secret
      POSTGRES_DB: watchtower
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: watchtower_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: