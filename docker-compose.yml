version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: watchtower_postgres
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: watchtower_redis
    restart: always
    ports:
      - "6379:6379"

  api:
    build: ./apps/api
    container_name: watchtower_api
    restart: always
    depends_on:
      - postgres
      - redis
    ports:
      - "3000:3000"
    env_file:
      - .env
      

  dashboard:
    build: ./apps/dashboard
    container_name: watchtower_dashboard
    restart: always
    depends_on:
      - api
    ports:
      - "3001:3001"
    env_file:
      - .env

volumes:
  postgres_data: